<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepShield - Legal Documents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }
        h1 {
            color: #7C3AED;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #999;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }
        .btn {
            display: block;
            padding: 18px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            border-left: 4px solid #7C3AED;
        }
        .info p {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 8px;
        }
        .info strong {
            color: #333;
        }
        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }
            h1 {
                font-size: 2em;
            }
            .btn {
                font-size: 1em;
                padding: 15px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>PrepShield</h1>
        <p class="subtitle">Crisis Preparation App</p>
        
        <div class="links">
            <a href="privacy-policy.html" class="btn">📋 Privacy Policy</a>
            <a href="terms-of-service.html" class="btn">📜 Terms of Service</a>
        </div>

        <div class="info">
            <p><strong>📱 PrepShield Mobile App</strong></p>
            <p>Available on iOS App Store and Google Play Store</p>
            <p style="margin-top: 15px; color: #999; font-size: 0.85em;">
                For questions about privacy or terms, contact:<br>
                <strong style="color: #7C3AED;">kondziela.marek@gmail.com</strong>
            </p>
        </div>

        <div class="footer">
            <p>&copy; 2026 PrepShield. All rights reserved.</p>
            <p>Last Updated: March 10, 2026</p>
        </div>
    </div>
</body>
</html>
